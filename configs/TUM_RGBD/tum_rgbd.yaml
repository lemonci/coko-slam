project_name: "Coko-SLAM"
dataset_name: "tum_rgbd"
multi_gpu: False  # Put every agent on a separate GPU
use_wandb: False
wandb_offline: False
experiment_name: "tum_rgbd"
group_name: "tum_rgbd"
seed: 0
checkpoint_path: null
use_wandb: False
frame_limit: -1 # for debugging, set to -1 to disable
seed: 0
mapping:
  new_submap_every: 50
  map_every: 5
  iterations: 100
  new_submap_iterations: 100
  new_submap_points_num: 100000 
  new_submap_gradient_points_num: 50000 
#  new_frame_sample_size: 30000 
#  new_points_radius: 0.0001
#  current_view_opt_iterations: 0.4 # What portion of iterations to spend on the current view
  alpha_thre: 0.6
  pruning_thre: 0.5
  visualize: False
  active_compaction: True
  prune_ratio: 0.05
  init_rho: 0.0005
  compaction_start: 0.7
  compaction_end: 0.95
#  submap_using_motion_heuristic: True
tracking:
#  gt_camera: False
  w_color_loss: 0.6
  iterations: 200
  cam_rot_lr: 0.002
  cam_trans_lr: 0.01
  odometry_type: "const_speed"  # gt, const_speed, odometer
  help_camera_initialization: False # temp option to help const_init
  init_err_ratio: 5
  odometer_method: "hybrid" # hybrid or point_to_plane
  filter_alpha: False
  filter_outlier_depth: False
  alpha_thre: 0.98
  soft_alpha: True
  mask_invalid_depth: True
loop_detection:
  # feature_extractor_name: "netvlad"
  # weights_path: "<path_to>/TokyoTM_struct.mat"
  # embed_size: 4096
  # feature_dist_threshold: .8
  feature_extractor_name: "dino"  # netvlad
  weights_path: "./dinov2-small"
  embed_size: 384
  feature_dist_threshold: .1
  device: cpu
  time_threshold: 0
  max_loops_per_frame: 1
  fitness_threshold: 0.35
  inlier_rmse_threshold: 0.1
cam:
  crop_edge: 16
  depth_scale: 5000.0
data:
  agent_ids: [0, 1]
  output_path: "./output/TUM_RGBD/full_gs_depth"
submap:
  anchor_data: render_depth #pcd, depth, render_depth